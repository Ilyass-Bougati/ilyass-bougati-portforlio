services:
  postgres:
      image: postgres:15-alpine
      container_name: blog-db-container
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: blog
      ports:
        - "5432:5432"
      volumes:
        - blog_pg_data:/var/lib/postgresql/data
      restart: unless-stopped





volumes:
  blog_pg_data:
